<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Network Analysis: Fraud Detection</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
body { margin: 0; background-color: #0f111a; color: #e2e8f0; font-family: 'Sarabun', sans-serif; overflow: hidden; }
#viz { width: 100vw; height: 100vh; cursor: grab; }
#viz:active { cursor: grabbing; }
.tooltip { position: absolute; background: rgba(15, 23, 42, 0.95); border: 1px solid #334155; padding: 18px; border-radius: 8px; color: #f8fafc; pointer-events: none; opacity: 0; font-size: 14px; box-shadow: 0 15px 30px rgba(0,0,0,0.8); z-index: 10; backdrop-filter: blur(8px); max-width: 350px; line-height: 1.5; }
.tooltip strong { color: #38bdf8; font-size: 16px; display: block; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 8px; }
.badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-right: 5px; }
.badge-winner { background: #10b981; color: #022c22; }
.badge-cover { background: #e11d48; color: white; }
#panel { position: absolute; top: 20px; left: 20px; background: rgba(30, 41, 59, 0.85); padding: 25px; border-radius: 12px; border: 1px solid #334155; backdrop-filter: blur(10px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); pointer-events: auto; z-index: 100; }
h1 { margin: 0 0 15px 0; font-size: 22px; color: #f8fafc; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.legend-item { display: flex; align-items: center; margin-top: 12px; font-size: 14px; color: #cbd5e1; }
.legend-color { width: 16px; height: 16px; border-radius: 50%; margin-right: 12px; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
.control-group { margin-top: 20px; padding-top: 15px; border-top: 1px solid #334155; }
input[type="text"] { width: 100%; padding: 10px; background: #0f111a; border: 1px solid #334155; color: #f8fafc; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; }
.btn-action { background: #38bdf8; color: #0f111a; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-right: 5px; margin-bottom: 5px; }
.btn-action:hover { background: #0284c7; }
.btn-secondary { background: #475569; color: #f8fafc; }
.btn-secondary:hover { background: #334155; }
#searchFab { position: absolute; top: 20px; left: 20px; background: rgba(30, 41, 59, 0.9); border: 1px solid #334155; color: #f8fafc; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; font-size: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 101; display: none; transition: 0.3s; justify-content: center; align-items: center; }
#searchFab:hover { background: #38bdf8; color: #0f111a; transform: scale(1.1); }
.btn-close { background: transparent; border: none; color: #cbd5e1; font-size: 20px; cursor: pointer; padding: 0; transition: 0.2s; }
.btn-close:hover { color: #e11d48; transform: scale(1.2); }
.panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
#panel h1 { margin: 0; font-size: 18px; border: none; padding: 0; }
</style>
</head>
<body>
<button id="searchFab" onclick="togglePanel(true)">🔍</button>

<div id="panel">
<div class="panel-header">
<h1>ระบบวิเคราะห์เครือข่ายความสัมพันธ์</h1>
<button class="btn-close" onclick="togglePanel(false)">✖</button>
</div>
<div class="legend-item"><div class="legend-color" style="background: #10b981;"></div> ผู้ชนะประมูล</div>
<div class="legend-item"><div class="legend-color" style="background: #e11d48;"></div> ผู้เสนอราคาคู่เทียบ</div>
<div class="legend-item"><div class="legend-color" style="background: #64748b; height: 3px; border-radius: 0;"></div> ความถี่ในการแข่งขัน</div>
<div class="control-group">
<input type="text" id="searchInput" placeholder="พิมพ์ชื่อบริษัทเพื่อค้นหา...">
<button id="btnSearch" class="btn-action">ค้นหา</button>
<button id="btnTop5" class="btn-action" style="background:#fcd34d;" hidden></button>
<button id="btnReset" class="btn-action btn-secondary" hidden></button>
</div>
</div>
<div id="tooltip" class="tooltip"></div>
<div id="viz"></div>
<script>
// ฟังก์ชันนี้ต้องอยู่นอก fetch เพื่อให้ปุ่ม HTML เรียกใช้ได้
function togglePanel(show) {
    document.getElementById('panel').style.display = show ? 'block' : 'none';
    document.getElementById('searchFab').style.display = show ? 'none' : 'flex';
}

const jsonUrl = 'data.json'; 

fetch(jsonUrl)
    .then(response => {
        if (!response.ok) throw new Error("Network response was not ok");
        return response.json();
    })
    .then(graphData => {
        // ==========================================
        // 1. ระบบยุบรวมเส้นทับซ้อน (Merge Bi-directional Links)
        // ==========================================
        const mergedLinksMap = {};
        graphData.links.forEach(l => {
            const s = typeof l.source === 'object' ? l.source.id : l.source;
            const t = typeof l.target === 'object' ? l.target.id : l.target;
            const pair = [s, t].sort();
            const key = pair[0] + "|||" + pair[1];

            if(!mergedLinksMap[key]) {
                mergedLinksMap[key] = {
                    source: pair[0], 
                    target: pair[1],
                    total_competed: 0,
                    breakdown: {},
                    agencies_involved: new Set(),
                    provinces_involved: new Set()
                };
            }
            const mLink = mergedLinksMap[key];
            mLink.total_competed += l.competed_times;
            if(!mLink.breakdown[s]) mLink.breakdown[s] = 0;
            mLink.breakdown[s] += l.competed_times;
            l.agencies_involved.forEach(a => mLink.agencies_involved.add(a));
            l.provinces_involved.forEach(p => mLink.provinces_involved.add(p));
        });

        const globalMergedLinks = Object.values(mergedLinksMap).map(m => ({
            source: m.source,
            target: m.target,
            total_competed: m.total_competed,
            breakdown: m.breakdown,
            agencies_involved: Array.from(m.agencies_involved),
            provinces_involved: Array.from(m.provinces_involved)
        }));

        // ==========================================
        // 2. ตั้งค่าการวาดกราฟ D3.js
        // ==========================================
        let currentSimulation, linkElements, linkLabelElements, nodeElements, labelElements;
        const width = window.innerWidth;
        const height = window.innerHeight;
        const svg = d3.select("#viz").append("svg").attr("width", width).attr("height", height);
        const g = svg.append("g");
        const tooltip = d3.select("#tooltip");

        svg.call(d3.zoom().scaleExtent([0.1, 5]).on("zoom", e => g.attr("transform", e.transform)));

        let maxBudget = d3.max(graphData.nodes, d => d.total_budget_won) || 1000000;
        const sizeScale = d3.scaleSqrt().domain([0, maxBudget]).range([8, 45]);

        let maxCompeted = d3.max(globalMergedLinks, d => d.total_competed) || 1;
        const linkScale = d3.scaleLinear().domain([1, maxCompeted]).range([1.5, 8]);

        const linkGroup = g.append("g");
        const linkLabelGroup = g.append("g");
        const nodeGroup = g.append("g");
        const labelGroup = g.append("g");

        function updateGraph(nData, lData) {
            if(currentSimulation) currentSimulation.stop();

            linkElements = linkGroup.selectAll("line")
                .data(lData, d => (typeof d.source === 'object' ? d.source.id : d.source) + "-" + (typeof d.target === 'object' ? d.target.id : d.target))
                .join("line")
                .attr("stroke", "#475569")
                .attr("stroke-opacity", 0.5)
                .attr("stroke-width", d => linkScale(d.total_competed))
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("stroke", "#fcd34d").attr("stroke-opacity", 1);
                    let breakdownHtml = Object.entries(d.breakdown)
                        .map(([company, wins]) => `• <span style="color:#10b981">${company}</span> เป็นผู้ชนะ <b style="color:#fff">${wins}</b> ครั้ง`)
                        .join("<br>");
                    tooltip.style("opacity", 1)
                        .html(`<strong>ข้อมูลการแข่งขันร่วมกัน</strong>
                        แข่งขันกันทั้งหมด: <b style="color:#fcd34d; font-size:16px">${d.total_competed}</b> ครั้ง<br>
                        <div style="margin: 10px 0; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 6px; border-left: 3px solid #38bdf8;">
                            <div style="color:#38bdf8; font-size:12px; margin-bottom:5px;">สถิติการชนะระหว่าง 2 บริษัทนี้:</div>
                            ${breakdownHtml}
                        </div>
                        พื้นที่ดำเนินการ: ${d.provinces_involved.join(", ")}<br>
                        หน่วยงานรับผิดชอบ: ${d.agencies_involved.join(", ")}`);
                })
                .on("mousemove", event => tooltip.style("left", (event.pageX + 20) + "px").style("top", (event.pageY - 30) + "px"))
                .on("mouseout", function() {
                    d3.select(this).attr("stroke", "#475569").attr("stroke-opacity", 0.5);
                    tooltip.style("opacity", 0);
                });

            linkLabelElements = linkLabelGroup.selectAll("text")
                .data(lData, d => (typeof d.source === 'object' ? d.source.id : d.source) + "-" + (typeof d.target === 'object' ? d.target.id : d.target))
                .join("text")
                .text(d => d.total_competed)
                .attr("font-size", "14px").attr("font-weight", "bold").attr("fill", "#fcd34d")
                .style("text-shadow", "1px 1px 2px #000, -1px -1px 2px #000, 1px -1px 2px #000, -1px 1px 2px #000")
                .style("pointer-events", "none");

            nodeElements = nodeGroup.selectAll("circle")
                .data(nData, d => d.id)
                .join("circle")
                .attr("r", d => d.total_budget_won > 0 ? sizeScale(d.total_budget_won) : 6)
                .attr("fill", d => d.type === "Winner" ? "#10b981" : "#e11d48")
                .attr("stroke", "#0f111a").attr("stroke-width", 2)
                .call(d3.drag()
                    .on("start", e => { if (!e.active) currentSimulation.alphaTarget(0.3).restart(); e.subject.fx = e.subject.x; e.subject.fy = e.subject.y; })
                    .on("drag", e => { e.subject.fx = e.x; e.subject.fy = e.y; })
                    .on("end", e => { if (!e.active) currentSimulation.alphaTarget(0); e.subject.fx = null; e.subject.fy = null; }))
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("stroke", "#fcd34d").attr("stroke-width", 4);
                    linkElements.attr("stroke", l => ((typeof l.source === 'object' ? l.source.id : l.source) === d.id || (typeof l.target === 'object' ? l.target.id : l.target) === d.id) ? "#fcd34d" : "#1e293b")
                        .attr("stroke-opacity", l => ((typeof l.source === 'object' ? l.source.id : l.source) === d.id || (typeof l.target === 'object' ? l.target.id : l.target) === d.id) ? 1 : 0.05);
                    linkLabelElements.attr("opacity", l => ((typeof l.source === 'object' ? l.source.id : l.source) === d.id || (typeof l.target === 'object' ? l.target.id : l.target) === d.id) ? 1 : 0.05);
                    nodeElements.attr("opacity", n => {
                        if(n.id === d.id) return 1;
                        const isConnected = lData.some(l => {
                            const s = typeof l.source === 'object' ? l.source.id : l.source;
                            const t = typeof l.target === 'object' ? l.target.id : l.target;
                            return (s === d.id && t === n.id) || (t === d.id && s === n.id);
                        });
                        return isConnected ? 1 : 0.15;
                    });
                    const budgetFormatted = d.total_budget_won > 0 ? d.total_budget_won.toLocaleString('th-TH') + " บาท" : "ไม่มีประวัติการชนะ";
                    tooltip.style("opacity", 1)
                        .html(`<strong>${d.id}</strong>ชนะประมูลทั้งหมด: ${d.total_projects_won} โครงการ<br>เข้าร่วมยื่นซอง: ${d.total_bids_participated} ครั้ง<br>มูลค่ารวมที่ชนะ: <span style="color:#fcd34d; font-weight:bold;">${budgetFormatted}</span><br>หน่วยงานที่ผูกขาดหลัก: ${d.dominant_agency}`);
                })
                .on("mousemove", event => tooltip.style("left", (event.pageX + 20) + "px").style("top", (event.pageY - 30) + "px"))
                .on("mouseout", function() {
                    d3.select(this).attr("stroke", "#0f111a").attr("stroke-width", 2);
                    linkElements.attr("stroke", "#475569").attr("stroke-opacity", 0.5);
                    linkLabelElements.attr("opacity", 1);
                    nodeElements.attr("opacity", 1);
                    tooltip.style("opacity", 0);
                });

            labelElements = labelGroup.selectAll("text")
                .data(nData.filter(d => d.type === "Winner" && d.total_budget_won > 500000000), d => d.id)
                .join("text")
                .text(d => d.id)
                .attr("font-size", "14px").attr("font-weight", "bold").attr("fill", "#f8fafc")
                .style("text-shadow", "2px 2px 4px #000, -2px -2px 4px #000, 2px -2px 4px #000, -2px 2px 4px #000")
                .attr("dx", d => sizeScale(d.total_budget_won) + 8).attr("dy", 5)
                .style("pointer-events", "none");

            currentSimulation = d3.forceSimulation(nData)
                .force("link", d3.forceLink(lData).id(d => d.id).distance(180))
                .force("charge", d3.forceManyBody().strength(-350))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collide", d3.forceCollide().radius(d => sizeScale(d.total_budget_won) + 15));

            currentSimulation.on("tick", () => {
                linkElements.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                linkLabelElements.attr("x", d => (d.source.x + d.target.x) / 2).attr("y", d => ((d.source.y + d.target.y) / 2) - 8);
                nodeElements.attr("cx", d => d.x).attr("cy", d => d.y);
                labelElements.attr("x", d => d.x).attr("y", d => d.y);
            });
        }

        // วาดกราฟครั้งแรก
        updateGraph(graphData.nodes, globalMergedLinks);

        // ==========================================
        // 3. ระบบค้นหา & กรองข้อมูล
        // ==========================================
        const top5Winners = [...graphData.nodes].filter(d => d.type === "Winner").sort((a, b) => b.total_projects_won - a.total_projects_won).slice(0, 5).map(d => d.id);

        function applyFilter(targetIds) {
            if(targetIds.length === 0) { updateGraph(graphData.nodes, globalMergedLinks); return; }
            const fLinks = globalMergedLinks.filter(l => targetIds.includes(typeof l.source === 'object' ? l.source.id : l.source) || targetIds.includes(typeof l.target === 'object' ? l.target.id : l.target));
            const validNodes = new Set(targetIds);
            fLinks.forEach(l => { validNodes.add(typeof l.source === 'object' ? l.source.id : l.source); validNodes.add(typeof l.target === 'object' ? l.target.id : l.target); });
            updateGraph(graphData.nodes.filter(n => validNodes.has(n.id)), fLinks);
        }

        document.getElementById('btnTop5').onclick = () => { applyFilter(top5Winners); togglePanel(false); };
        document.getElementById('btnSearch').onclick = () => {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            if(!query) { applyFilter([]); return; }
            const matches = graphData.nodes.filter(n => n.id.toLowerCase().includes(query)).map(n => n.id);
            if(matches.length > 0) { applyFilter(matches); togglePanel(false); } else { alert("ไม่พบชื่อบริษัทที่ค้นหา"); }
        };
        document.getElementById('btnReset').onclick = () => { document.getElementById('searchInput').value = ""; applyFilter([]); };

        // ==========================================
        // 4. ระบบรับค่าจาก URL (ArcGIS)
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const companyNameFromArcGIS = urlParams.get('company');

        if (companyNameFromArcGIS) {
            document.getElementById('searchInput').value = companyNameFromArcGIS;
            const query = companyNameFromArcGIS.trim().toLowerCase();
            const matches = graphData.nodes.filter(n => n.id.toLowerCase().includes(query)).map(n => n.id);

            if (matches.length > 0) {
                applyFilter(matches);
                togglePanel(false);
            }
        }

    })
    .catch(error => {
        console.error('Error fetching the JSON data:', error);
        // แสดงข้อความเตือนถ้าเปิดไฟล์แบบ file:/// โดยตรง
        alert("ไม่สามารถดึงข้อมูล data.json ได้ กรุณาเปิดไฟล์นี้บนเซิร์ฟเวอร์ (เช่น GitHub Pages, GitLab, หรือ Live Server) แทนการเปิดไฟล์จากคอมพิวเตอร์โดยตรง");
    });

</script>
</body>
</html>
